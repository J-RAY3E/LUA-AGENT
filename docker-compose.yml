version: '3.8'

services:
  lua-agent:
    build: .
    container_name: lua-agent-demo
    volumes:
      - ./output:/app/output 
    environment:
      - LOCAL_LLM_URL=http://host.docker.internal:11434/v1
      - LOCAL_LLM_MODEL=qwen-lua-agent
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: "no"