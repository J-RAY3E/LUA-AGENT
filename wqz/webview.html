<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; color: var(--vscode-foreground); background: var(--vscode-editor-background); }
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid #555; margin-bottom: 20px; }
        .tab-btn { padding: 8px; cursor: pointer; background: none; border: none; color: inherit; opacity: 0.6; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--vscode-button-background); }
        textarea, input { width: 100%; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid #555; padding: 8px; margin-bottom: 10px; }
        .code-block { background: #1e1e1e; padding: 15px; border-radius: 5px; font-family: monospace; position: relative; }
        .code-line { position: relative; display: block; }
        .code-line:hover { background: #333; }
        .lua-comment { color: #6a9955; font-style: italic; margin-left: 10px; }
        .hidden { display: none !important; }
        /* Hover Tooltip */
        .code-line[data-comment]:hover::after {
            content: "💡 " attr(data-comment);
            position: absolute; left: 20px; top: -25px;
            background: #252526; color: #ccc; border: 1px solid #454545;
            padding: 4px 8px; font-size: 11px; z-index: 10;
        }
        .message { padding: 10px; margin-top: 10px; border-radius: 4px; }
        .success { background: #2d4a3e; }
        .error { background: #4e2d2d; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gen', this)">Generate</button>
        <button class="tab-btn" onclick="switchTab('srch', this)">Search</button>
        <button class="tab-btn" onclick="switchTab('val', this)">Validate</button>
    </div>

    <div id="gen" class="tab-content">
        <textarea id="prompt" placeholder="Ask LUA-AGENT..."></textarea>
        <button onclick="sendGenerate()" style="width:100%; padding:10px;">Generate Code</button>
        <div id="genStatus"></div>
        <div id="resContainer" style="margin-top:20px;"></div>
    </div>

    <div id="srch" class="tab-content" style="display:none">
        <input id="q" placeholder="Search library...">
        <button onclick="sendSearch()" style="width:100%">Search</button>
        <div id="srchRes"></div>
    </div>

    <div id="val" class="tab-content" style="display:none">
        <textarea id="valCode" placeholder="Paste code here..."></textarea>
        <button onclick="sendValidate()" style="width:100%">Validate Syntax</button>
        <div id="valStatus"></div>
    </div>

   <script>
    const vscode = acquireVsCodeApi();
    let currentCode = "";
    let showComments = true;

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function sendGenerate() {
        const p = document.getElementById('prompt').value;
        document.getElementById('genStatus').innerHTML = "Generating...";
        vscode.postMessage({ command: 'generate', prompt: p });
    }

    function sendValidate() {
        const c = document.getElementById('valCode').value;
        vscode.postMessage({ command: 'validate', code: c });
    }

    function sendSearch() {
        const q = document.getElementById('q').value;
        vscode.postMessage({ command: 'search', query: q });
    }

    // Fungsi baru untuk menangani logika insert
    function insertToEditor() {
        let codeToInsert = "";
        
        if (showComments) {
            // Jika toggle ON, masukkan kode asli (dengan komentar)
            codeToInsert = currentCode;
        } else {
            // Jika toggle OFF, hapus komentar menggunakan regex sebelum insert
            codeToInsert = currentCode.split('\n').map(line => {
                const match = line.match(/(.*?)(\s*--.*)/);
                // Ambil grup 1 (kode saja) dan hilangkan spasi di akhir
                return match ? match[1].trimEnd() : line;
            }).join('\n');
        }

        vscode.postMessage({ 
            command: 'insertCode', 
            code: codeToInsert 
        });
    }

    function renderLines() {
        const container = document.getElementById('formatted-code');
        if (!container) return;
        container.innerHTML = "";
        
        currentCode.split('\n').forEach(line => {
            const div = document.createElement('div');
            div.className = 'code-line';
            const match = line.match(/(.*?)(\s*--\s*(.*))/);
            
            if(match) {
                div.textContent = match[1] || " ";
                div.setAttribute('data-comment', match[3]);
                const span = document.createElement('span');
                span.className = 'lua-comment' + (showComments ? '' : ' hidden');
                span.textContent = " -- " + match[3];
                div.appendChild(span);
            } else { 
                div.textContent = line || " "; 
            }
            container.appendChild(div);
        });
    }

    window.addEventListener('message', e => {
        const m = e.data;
        if(m.type === 'showCode') {
            currentCode = m.code;
            document.getElementById('genStatus').innerHTML = "";
            document.getElementById('resContainer').innerHTML = `
                <div style="margin-bottom:10px; display:flex; gap:5px;">
                    <button onclick="showComments=!showComments; renderLines()">Toggle Comments</button>
                    <button onclick="insertToEditor()">Insert to Editor</button>
                </div>
                <div class="code-block" id="formatted-code"></div>`;
            renderLines();
        }
        if(m.type === 'validationResult') {
            const status = document.getElementById('valStatus');
            status.className = "message " + (m.valid ? 'success' : 'error');
            status.innerHTML = m.valid ? "✅ Syntax Valid!" : "❌ Syntax Error!";
        }
        if(m.type === 'showResults') {
            document.getElementById('srchRes').innerHTML = m.results.map(r => `
                <div style="border:1px solid #444; padding:8px; margin-top:5px;">
                    <strong>${r.library_name}</strong><br><small>${r.description}</small>
                </div>`).join('');
        }
    });
</script>
</body>
</html>
